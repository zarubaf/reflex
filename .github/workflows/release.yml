name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Bundle .app
        run: |
          APP="Reflex.app"
          mkdir -p "${APP}/Contents/MacOS" "${APP}/Contents/Resources"
          cp target/aarch64-apple-darwin/release/reflex "${APP}/Contents/MacOS/reflex"
          cp resources/Info.plist "${APP}/Contents/Info.plist"
          cp resources/reflex.icns "${APP}/Contents/Resources/reflex.icns"
      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_DATA }}
          p12-password: ${{ secrets.APPLE_CERT_PASSWORD }}
      - name: Sign and notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          # Sign the binary with hardened runtime
          codesign \
            --timestamp \
            --options=runtime \
            --force --verify --verbose \
            --sign "Developer ID Application: Florian Zaruba (${APPLE_TEAM_ID})" \
            Reflex.app/Contents/MacOS/reflex

          # Sign the .app bundle
          codesign \
            --timestamp \
            --options=runtime \
            --force --verify --verbose \
            --sign "Developer ID Application: Florian Zaruba (${APPLE_TEAM_ID})" \
            Reflex.app

          # Create zip for notarization
          ditto -c -k --keepParent Reflex.app Reflex-notarize.zip

          # Submit for notarization and wait
          xcrun notarytool submit Reflex-notarize.zip \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_NOTARY_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait | tee notary.log
          grep -q Accepted notary.log

          # Staple the notarization ticket to the app
          xcrun stapler staple Reflex.app
      - name: Package
        run: |
          mkdir -p dist
          tar czf dist/Reflex-macos-aarch64.tar.gz Reflex.app
      - uses: actions/upload-artifact@v4
        with:
          name: Reflex-macos-aarch64
          path: dist/Reflex-macos-aarch64.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-cursor-dev \
            libxcb-render0-dev \
            libxcb-randr0-dev \
            libxcb-keysyms1-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libclang-dev \
            cmake
      - name: Build
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/reflex dist/reflex
          cd dist && tar czf reflex-linux-x86_64.tar.gz reflex
      - uses: actions/upload-artifact@v4
        with:
          name: reflex-linux-x86_64
          path: dist/reflex-linux-x86_64.tar.gz

  release:
    needs: [build-macos-arm, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Reflex-macos-aarch64/Reflex-macos-aarch64.tar.gz
            artifacts/reflex-linux-x86_64/reflex-linux-x86_64.tar.gz
